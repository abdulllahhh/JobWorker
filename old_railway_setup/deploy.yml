name: Deploy to Railway

on:
  push:
    branches:
      - main
    paths:
      - "watcher.py"
      - "requirements.txt"
      - "Procfile"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --detach --service watcher
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
